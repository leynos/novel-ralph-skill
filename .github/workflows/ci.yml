name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    env:
      CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
      CODESCENE_CLI_SHA256: ${{ vars.CODESCENE_CLI_SHA256 }}
      
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      
      - name: Install CLI tools
        run: |
          for tool in mbake; do uv tool install ${tool}; done
          npm install -g markdownlint-cli2

      - name: Validate Makefile
        run: mbake validate Makefile

      - name: Check spelling
        run: make spelling

      - name: Install code
        run: make build

      - name: Check formatting
        run: make check-fmt

      - name: Run ruff
        run: make lint

      - name: Run typechecker
        run: make typecheck

      # Dependency audits report advisories against the whole lockfile, so a
      # newly published advisory would fail every Dependabot PR regardless of
      # content and deadlock auto-merge. The scheduled audit workflow covers
      # Dependabot merges instead.
      - name: Audit dependencies
        if: github.actor != 'dependabot[bot]'
        run: make audit

      - name: Test and Measure Coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@1213d7874aa42ff034587d9385f35178d51e1f65
        with:
          output-path: coverage.xml
          format: cobertura
          artefact-name-suffix: novel-ralph-skill
          

      - name: Install CodeScene Coverage CLI
        if: env.CS_ACCESS_TOKEN != ''
        run: |
          curl -fsSL https://downloads.codescene.io/enterprise/cli/install-cs-coverage-tool.sh | bash -s -- -y
          if [ -n "${CODESCENE_CLI_SHA256:-}" ]; then
            echo "${CODESCENE_CLI_SHA256}  install-cs-coverage-tool.sh" | sha256sum -c -
          fi

      - name: Upload coverage to CodeScene
        if: env.CS_ACCESS_TOKEN != ''
        run: |
          if [ ! -f coverage.xml ]; then
            echo "coverage.xml not found!"
            exit 1
          fi
          cs-coverage upload \
            --format "cobertura" \
            --metric "line-coverage" \
            coverage.xml
